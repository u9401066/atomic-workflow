name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.7"
  NODE_VERSION: "20"

jobs:
  # ==========================================
  # 文檔檢查
  # ==========================================
  docs-check:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          files=("README.md" "SPEC.md" "CONSTITUTION.md" "LICENSE")
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done
          echo "✅ All required files exist"

  # ==========================================
  # Python 靜態分析
  # ==========================================
  static-analysis:
    name: 🔍 Static Analysis (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff Linting
        run: uv run ruff check . --output-format=github

      - name: Ruff Format Check
        run: uv run ruff format --check .

      - name: MyPy Type Check
        run: uv run mypy src/

      - name: Bandit Security Scan
        run: |
          uv run bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true
          uv run bandit -r src/ -c pyproject.toml -f txt

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  # ==========================================
  # Python 單元測試
  # ==========================================
  unit-tests:
    name: 🧪 Unit Tests (Python)
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Unit Tests with Coverage
        run: |
          uv run pytest tests/unit -v \
            --cov=src/atomic_workflow \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=html:htmlcov-unit \
            --cov-fail-under=80 \
            -n auto \
            --timeout=60 \
            --junitxml=junit-unit.xml

      - name: Upload Unit Test Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: |
            coverage-unit.xml
            htmlcov-unit/
          retention-days: 30

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-unit
          path: junit-unit.xml
          retention-days: 30

  # ==========================================
  # Python 整合測試（使用 corpus 檔案，無需 DB）
  # ==========================================
  integration-tests:
    name: 🔗 Integration Tests (Python)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Integration Tests with Coverage
        run: |
          uv run pytest tests/integration -v \
            --cov=src/atomic_workflow \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml \
            --timeout=120 \
            --junitxml=junit-integration.xml \
            -m integration

      - name: Upload Integration Test Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage-integration.xml
          retention-days: 30

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-integration
          path: junit-integration.xml
          retention-days: 30

  # ==========================================
  # VS Code Extension 建置
  # ==========================================
  extension-build:
    name: 🧩 VS Code Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Lint
        working-directory: extension
        run: npm run lint
        continue-on-error: true

      - name: Build
        working-directory: extension
        run: npm run build

      - name: Test
        working-directory: extension
        run: npm test
        continue-on-error: true

  # ==========================================
  # 覆蓋率報告合併
  # ==========================================
  coverage-report:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install coverage
        run: uv pip install coverage --system

      - name: Download Unit Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit
        continue-on-error: true

      - name: Download Integration Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration
        continue-on-error: true

      - name: Upload Combined Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit/coverage-unit.xml,coverage-integration/coverage-integration.xml
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true

      - name: Coverage Summary
        run: |
          echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See individual job reports for details." >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # 測試結果摘要
  # ==========================================
  test-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [static-analysis, unit-tests, integration-tests, extension-build, coverage-report]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Extension Build | ${{ needs.extension-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Report | ${{ needs.coverage-report.result }} |" >> $GITHUB_STEP_SUMMARY

